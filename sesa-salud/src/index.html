<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>SESA Salud</title>
  <base href="/">

  <!-- Viewport y PWA base -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a2e4f" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0c1222" media="(prefers-color-scheme: dark)">
  <meta name="description" content="Portal de salud SESA — Historia clínica, laboratorios y órdenes médicas en línea">

  <!-- PWA / Web App Manifest -->
  <link rel="manifest" href="manifest.webmanifest">

  <!-- iOS Safari PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SESA Portal">
  <link rel="apple-touch-icon" href="icon3.png">

  <!-- Android Chrome -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="SESA Portal">

  <!-- SEO y Open Graph -->
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="SESA Salud — Portal del Paciente">
  <meta property="og:description" content="Consulta tu historia clínica, resultados de laboratorio y órdenes médicas">

  <!-- Icono -->
  <link rel="icon" type="image/png" href="icon3.png">

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Tema sin FOUC -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('sesa-theme');
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <sesa-root></sesa-root>
</body>

</html>
