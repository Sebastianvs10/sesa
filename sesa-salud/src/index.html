<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>SESA</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('sesa-theme');
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
      } catch (e) { }
    })();
  </script>
  <link rel="icon" type="image/png" href="icon3.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <sesa-root></sesa-root>
</body>

</html>
