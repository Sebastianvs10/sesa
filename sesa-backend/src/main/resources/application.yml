# Desarrollo local (sin perfil activo o con spring.profiles.active=dev si se añade).
# Producción: SPRING_PROFILES_ACTIVE=prod + application-prod.yml
spring:
  application:
    name: sesa-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/sesa_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8000
  servlet:
    context-path: /api

# JWT para OAuth2 Resource Server (emitido por nuestro login)
sesa:
  cors:
    # Orígenes permitidos para el front (Angular). Incluir el puerto donde corre ng serve.
    allowed-origins: http://localhost:3000,http://localhost:4200
  jwt:
    secret: MiClaveSecretaMuyLargaParaFirmarJWTMinimo256BitsParaHS256
    expiration-ms: 86400000  # 24 horas

  # Recuperación de contraseña (tokens en public.password_reset_tokens_public)
  auth:
    password-reset:
      # true = incluye devToken en JSON (solo desarrollo; nunca en producción expuesto a Internet)
      expose-token: ${SESA_PASSWORD_RESET_EXPOSE_TOKEN:true}
      token-ttl-minutes: 30
      # Mitiga enumeración de correos midiendo tiempos de respuesta
      min-processing-ms: 400
  upload:
    path: ./uploads

  # Recordatorios de citas (24h y 1h antes): job programado. Cron cada hora en punto.
  recordatorios:
    cron: "0 0 * * * ?"
  # URL del frontend para enlaces de confirmación/cancelación de cita (S3)
  frontend-url: ${SESA_FRONTEND_URL:http://localhost:4200}

  # ── Consulta por documento (ADRES/BDUA vía Apitude) — opcional ─────────────
  adres:
    habilitado: false
    apitude:
      # API Key de Apitude (https://apitude.co) para consulta ADRES. Si no se configura, la consulta por cédula no llama a externos.
      api-key: ${SESA_ADRES_APITUDE_API_KEY:}

  # ── Interoperabilidad IHCE — Resolución 1888 de 2025 ──────────────────────
  fhir:
    ministerio:
      # URL del servidor FHIR del Ministerio de Salud (IHCE)
      base-url: https://fhir.minsalud.gov.co
      # API Key asignada por el Ministerio (configurar antes de activar)
      api-key: ${MINSALUD_FHIR_API_KEY:}
      # false = modo desarrollo (no envía al Ministerio)
      # true  = envío real (requiere api-key válida y habilitación del Ministerio)
      habilitado: false

logging:
  level:
    root: INFO
    com.sesa: INFO
    org.springframework.security: WARN
