spring:
  application:
    name: sesa-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/sesa_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update  # En desarrollo: permitir cambios automáticos
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

server:
  port: 8000
  servlet:
    context-path: /api

# JWT para OAuth2 Resource Server (emitido por nuestro login)
sesa:
  jwt:
    secret: dev-secret-key-only-for-development-minimum-256-bits-dev-secret-key-only-for-development
    expiration-ms: 86400000
  upload:
    path: ./uploads
  cors:
    # Mismos orígenes que application.yml; debe incluir el puerto del front (ng serve).
    allowed-origins: http://localhost:3000,http://localhost:4200

logging:
  level:
    root: INFO
    com.sesa: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
