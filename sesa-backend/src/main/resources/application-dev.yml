spring:
  application:
    name: sesa-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/sesa_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update  # En desarrollo: permitir cambios automáticos
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: "${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:8MB}"
      max-request-size: "${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:20MB}"

server:
  port: 8000
  servlet:
    context-path: /api
  tomcat:
    max-http-form-post-size: "${SERVER_TOMCAT_MAX_HTTP_FORM_POST_SIZE:20MB}"

# JWT para OAuth2 Resource Server (emitido por nuestro login)
sesa:
  jwt:
    secret: dev-secret-key-only-for-development-minimum-256-bits-dev-secret-key-only-for-development
    expiration-ms: 86400000
  upload:
    path: ./uploads
  cors:
    # Mismos orígenes que application.yml; debe incluir el puerto del front (ng serve).
    allowed-origins: http://localhost:3000,http://localhost:4200

  frontend-url: ${SESA_FRONTEND_URL:http://localhost:4200}

  # Mismo contrato que application.yml: con perfil dev también aplica RESEND_API_KEY + SESA_EMAIL_ENABLED.
  email:
    enabled: ${SESA_EMAIL_ENABLED:true}
    resend-api-key: ${RESEND_API_KEY:}
    from: ${SESA_EMAIL_FROM:SESA <onboarding@resend.dev>}
    reply-to: ${SESA_EMAIL_REPLY_TO:}
    logo-url: ${SESA_EMAIL_LOGO_URL:}
    brand-name: ${SESA_EMAIL_BRAND_NAME:SESA}
    footer-legal: ${SESA_EMAIL_FOOTER_LEGAL:Sistema Electrónico de Salud · Colombia}
    resend-api-base: ${SESA_RESEND_API_BASE:https://api.resend.com}

logging:
  level:
    root: INFO
    com.sesa: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
