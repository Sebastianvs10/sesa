# Perfil prod: Render, VM u otros. Secretos SOLO por variables de entorno (panel Render).
# Arranque local con prod: exportar SPRING_DATASOURCE_*, SESA_JWT_SECRET, etc.
# Autor: Ing. J Sebastian Vargas S
spring:
  application:
    name: sesa-backend

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    # Obligatorios en producción real (Render + Neon, etc.)
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME:sesa_dbuser}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Instancias pequeñas (free): pocos hilos; subir con SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE si crece el plan
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:8}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      connection-timeout: 20000
      max-lifetime: 1740000
      idle-timeout: 600000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false

server:
  port: ${PORT:8080}
  shutdown: graceful
  # Render termina TLS; encadenar X-Forwarded-* para URLs y seguridad
  forward-headers-strategy: framework
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

sesa:
  jwt:
    secret: ${SESA_JWT_SECRET}
    expiration-ms: ${SESA_JWT_EXPIRATION_MS:86400000}
  upload:
    path: ${SESA_UPLOAD_PATH:/tmp/sesa/uploads}
  cors:
    allowed-origins: ${SESA_CORS_ALLOWED_ORIGINS:https://appsesa.online,https://www.appsesa.online,https://app.appsesa.online}
  recordatorios:
    cron: ${SESA_RECORDATORIOS_CRON:0 0 * * * ?}
  frontend-url: ${SESA_FRONTEND_URL:https://appsesa.online}

logging:
  level:
    root: WARN
    com.sesa: INFO
    org.springframework.security: WARN
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOGGING_FILE_NAME:/tmp/sesa-application.log}
    max-size: 50MB
    max-history: 14

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
    info:
      enabled: false
